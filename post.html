<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Post | GuruByte</title>
<meta name="description" content="GuruByte blog article">
<link rel="stylesheet" href="style.css">

<style>

.post-container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.post-header img{
width:100%;
max-height:400px;
object-fit:cover;
border-radius:8px;
margin-bottom:20px;
}

.post-title{
font-size:34px;
margin-bottom:10px;
}

.post-meta{
color:#777;
margin-bottom:25px;
}

.post-content{
font-size:17px;
line-height:1.7;
margin-bottom:40px;
}

.share{
margin-bottom:40px;
}

.share a{
margin-right:10px;
text-decoration:none;
padding:8px 12px;
background:#0077ff;
color:white;
border-radius:6px;
font-size:14px;
}

.related-posts{
margin-top:50px;
}

.related-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.related-card{
border:1px solid #eee;
border-radius:8px;
overflow:hidden;
}

.related-card img{
width:100%;
height:140px;
object-fit:cover;
}

.related-card div{
padding:10px;
font-size:15px;
}

.comments{
margin-top:60px;
}

</style>
</head>

<body>

<div class="post-container">

<div class="post-header">
<img id="postImage" src="" alt="">
<h1 id="postTitle" class="post-title"></h1>
<div id="postMeta" class="post-meta"></div>
</div>

<div id="postContent" class="post-content"></div>

<div class="share">
<strong>Share:</strong>
<a id="shareTwitter" target="_blank">Twitter</a>
<a id="shareLinkedIn" target="_blank">LinkedIn</a>
<a id="shareFacebook" target="_blank">Facebook</a>
</div>

<div class="related-posts">
<h3>Related Posts</h3>
<div id="relatedPosts" class="related-grid"></div>
</div>

<div class="comments">
<h3>Comments</h3>

<div id="disqus_thread"></div>

<script>
var disqus_config = function () {
this.page.url = window.location.href;
this.page.identifier = window.location.search;
};

(function() {
var d = document, s = d.createElement('script');
s.src = 'https://YOUR_DISQUS_SHORTNAME.disqus.com/embed.js';
s.setAttribute('data-timestamp', +new Date());
(d.head || d.body).appendChild(s);
})();
</script>

</div>

</div>

<script src="script/post.js"></script>

</body>
</html>
